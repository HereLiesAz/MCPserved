name: Build Desktop Executables

# Desktop installers are built every time the Android app is — the triggers here
# mirror merged-build.yml (push to any branch, PRs into main, manual dispatch),
# plus an explicit `desktop-v*` tag for a versioned standalone release. jpackage
# can only target the OS it runs on, so the build fans out across a Windows /
# macOS / Linux matrix.
on:
  push:
    branches: [ "**" ]
    tags: [ "desktop-v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version (must start with a non-zero major, e.g. 1.0.0)"
        required: false
        default: ""

# Cancel superseded runs on the same ref, matching the APK workflow so feature
# branches don't pile up three-OS matrix builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; the release job elevates its own token.
permissions:
  contents: read

jobs:
  build:
    name: Package (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          dependency-graph: disabled

      # jpackage builds .deb with dpkg + fakeroot and .rpm with rpmbuild; neither
      # rpmbuild nor fakeroot is guaranteed on the runner image.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils rpm

      # jpackage rejects a zero major version on Windows and macOS, but the
      # Android versionName sits at 0.x. A `desktop-vX.Y.Z` tag sets the version
      # verbatim; a manual run can override it; otherwise it is derived from
      # version.properties with the major floored to 1.
      - name: Resolve installer version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == desktop-v* ]]; then
            V="${GITHUB_REF_NAME#desktop-v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            V="${{ github.event.inputs.version }}"
          else
            MAJOR=$(grep '^versionMajor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
            MINOR=$(grep '^versionMinor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
            PATCH=$(grep '^versionPatch=' version.properties | cut -d'=' -f2 | tr -d '\r ')
            [[ "$MAJOR" == "0" || -z "$MAJOR" ]] && MAJOR=1
            V="${MAJOR}.${MINOR:-0}.${PATCH:-0}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Installer version: $V"

      - name: Build native distributables
        shell: bash
        run: |
          chmod +x ./gradlew || true
          ./gradlew :desktop:packageDistributionForCurrentOS \
            -PdesktopPackageVersion=${{ steps.ver.outputs.version }} \
            --stacktrace

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find desktop/build/compose/binaries/main -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' \) \
            -exec cp {} dist/ \; || true
          ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcpserved-desktop-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  # On a push to main, attach the installers to the same release the APK lands on
  # (merged-build.yml publishes latest-debug-v<MAJOR>.<MINOR>), so every APK build
  # ships its matching desktop executables. A desktop-v* tag gets its own release.
  release:
    name: Attach installers to release
    needs: build
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/desktop-v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "standalone=true" >> "$GITHUB_OUTPUT"
          else
            MAJOR=$(grep '^versionMajor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
            MINOR=$(grep '^versionMinor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
            echo "tag=latest-debug-v${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
            echo "standalone=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          STANDALONE: ${{ steps.tag.outputs.standalone }}
        shell: bash
        run: |
          # download-artifact unpacks each OS's artifact into its own
          # subdirectory, so a recursive glob would also match those directories
          # and `gh release upload` fails with "is a directory". Collect only the
          # regular installer files.
          mapfile -t FILES < <(find artifacts -type f)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No installers to publish."; exit 0
          fi
          echo "Publishing ${#FILES[@]} installers to $TAG"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            # The release already exists (the APK job on main, or a prior run) —
            # add/replace only the desktop installers, leaving the APK untouched.
            gh release upload "$TAG" "${FILES[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          elif [ "$STANDALONE" = "true" ]; then
            gh release create "$TAG" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "MCPserved Desktop $TAG" \
              --notes "Native desktop installers for Windows, macOS, and Linux."
          else
            # Main-branch run that raced ahead of the APK release job. Create the
            # shared prerelease tag; the APK job's `gh release edit`/upload later
            # coexists (different asset names).
            gh release create "$TAG" "${FILES[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --target "$GITHUB_SHA" \
              --title "Latest Debug Build ($TAG)" \
              --notes "Auto-build from commit $GITHUB_SHA"
          fi
