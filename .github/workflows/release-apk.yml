name: Compile and Release APK

on:
  workflow_dispatch:

# Least-privilege default token; jobs needing more declare their own permissions block.
permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # OpenCV (Java + native via Prefab) is a plain Maven Central dependency now — Gradle resolves
      # it during the build, so there is no library-fetch step here anymore.

      - name: Inject Google Services
        env:
          GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ARCORE_API_KEY: ${{ secrets.ARCORE_API_KEY }}
        run: |
          if [ -f "app/google-services.json.template" ]; then
            echo "Template found. Injecting secrets..."
            sed -e 's/{{\([^}]*\)}}/${\1}/g' app/google-services.json.template | envsubst > app/google-services.json
          else
            echo "Warning: google-services.json.template not found. Skipping injection."
          fi

          # Inject ARCore API Key into local.properties for build.gradle.kts to pick up
          echo "ARCORE_API_KEY=$ARCORE_API_KEY" >> local.properties

      - name: Decode signing keystore
        env:
          KEYSTORE_RAW: ${{ secrets.KEYSTORE_RAW }}
        run: |
          if [ -z "$KEYSTORE_RAW" ]; then
            echo "::error::KEYSTORE_RAW secret is empty — cannot produce a signed build."
            exit 1
          fi
          echo "$KEYSTORE_RAW" | base64 -d > app/keystore.jks
          if [ ! -s app/keystore.jks ]; then
            echo "::error::Decoded keystore is empty — KEYSTORE_RAW is not valid base64."
            exit 1
          fi
          echo "Keystore decoded to app/keystore.jks ($(stat -c%s app/keystore.jks) bytes)"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          cache-read-only: false
          dependency-graph: disabled

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Consumed by the signingConfigs.release block in app/build.gradle.kts.
          KEYSTORE_FILE: ${{ github.workspace }}/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # No -PversionBuild override: build.gradle.kts auto-increments versionBuild on every build.
        run: |
          ./gradlew assembleRelease

      - name: Prepare Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # version.properties is the SINGLE SOURCE OF TRUTH for the version. The gradle build above
          # already incremented versionBuild (the Android versionCode) and versionPatch and baked them
          # into the APK; read the SAME values here so the release name and tag match the artifact
          # exactly. NEVER derive the version from the git commit count — that scheme collides with
          # versionBuild and causes Play "downgrade" (versionCode regression) rejections.
          MAJOR=$(grep '^versionMajor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          MINOR=$(grep '^versionMinor=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          PATCH=$(grep '^versionPatch=' version.properties | cut -d'=' -f2 | tr -d '\r ')
          BUILD_NUMBER=$(grep '^versionBuild=' version.properties | cut -d'=' -f2 | tr -d '\r ')

          VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}.${BUILD_NUMBER}"
          TAG_NAME="latest-release-v${MAJOR}.${MINOR}"

          # Locate built APK
          APK_ORIGINAL=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_ORIGINAL" ]; then
            echo "Error: No APK found in app/build/outputs/apk/release/"
            find app/build/outputs/ -name "*.apk"
            exit 1
          fi

          TARGET_NAME="GraffitiXR-${VERSION_NAME}-release.apk"
          mv "$APK_ORIGINAL" "$TARGET_NAME"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force update tag to current commit
          git tag -fa "$TAG_NAME" -m "Latest Release Build"
          git push origin "$TAG_NAME" --force

          # Create or update release
          if gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Updating existing release..."
            gh release edit "$TAG_NAME" \
              --title "Latest Release v${MAJOR}.${MINOR} (${VERSION_NAME})" \
              --notes "Release build from commit $GITHUB_SHA"
            gh release upload "$TAG_NAME" "$TARGET_NAME" --clobber
          else
            echo "Creating new release..."
            gh release create "$TAG_NAME" "$TARGET_NAME" \
              --title "Latest Release v${MAJOR}.${MINOR} (${VERSION_NAME})" \
              --notes "Release build from commit $GITHUB_SHA"
          fi
